query epochDetailsInRange (
    $numbers: [Int!]
) {
    epochs( where: { number: { _in: $numbers }}) {
        adaPots {
            deposits_stake,
            deposits_drep,
            deposits_proposal,
            fees,
            reserves,
            rewards,
            treasury,
            utxo
        }
        blocksCount
        fees
        output
        number
        transactionsCount
        startedAt
        lastBlockTime
    }
}