query issue_953_nullable_token_quantity(
  $hashes: [Hash32Hex]!
) {
  transactions(
    where: { hash: { _in: $hashes } }
  ) {
    hash
    outputs(order_by: { index: asc }) {
      index
      tokens {
        asset {
          assetId
        }
        quantity
      }
    }
    mint {
      asset {
        assetId
      }
      quantity
    }
  }
}
