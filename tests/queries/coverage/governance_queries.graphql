query governanceQueries(
  $limit: Int!
) {
  govActionProposal(limit: $limit) {
    tx_id
    index
    type
    deposit
    expiration
    return_address
    description
    VotingAnchor { url data_hash }
    transaction { hash }
  }
  govActionProposal_aggregate {
    aggregate { count }
  }
  voteProcedure(limit: $limit) {
    voter_role
    vote
    index
    gov_action_proposal_id
    transaction { hash }
  }
  voteProcedure_aggregate {
    aggregate { count }
  }
  drepRegistrations(limit: $limit) {
    DRepId
    deposit
    votingAnchor { url data_hash }
    transaction { hash }
  }
  epochParams(limit: $limit) {
    epoch_no
    committee_min_size
    committee_max_term_length
    gov_action_lifetime
    gov_action_deposit
    drep_deposit
    drep_activity
    dvt_motion_no_confidence
    pvt_motion_no_confidence
    pvtpp_security_group
  }
}
