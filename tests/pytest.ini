[pytest]
testpaths = functional negative multi_instance schema
python_files = test_*.py
python_classes = Test*
python_functions = test_*
console_output_style = times
addopts =
    -n 0
    -r a
    --strict-markers
    --disable-warnings
    --tb=short
    --color=yes
markers =
    pr: Fast, must-pass on every PR (target <60s)
    nightly: Comprehensive suite against mainnet + preprod (Phase 2+)
    smoke: Non-blocking sync / data-availability checks
    slow: Tests with >5s single-test budget
    golden: Golden-file comparison tests
    negative: Error-path tests (bad input, missing required args)
    sanity: cardanoDbMeta / genesis / tip checks
    requires_token_registry: Needs TOKEN_REGISTRY_ENABLED on the GraphQL instance
    multi_instance: Phase 3 — compare primary vs --compare-url; skipped by default
    regression: Phase 4 — issue-reproducer goldens
    schema: Phase 5 — schema introspection diff
env =
    D:CARDANO_NETWORK=mainnet
    D:GRAPHQL_URL=http://localhost:3100
