query VoteProceduresBySPO(
  $gov_action_proposal_id: Int_comparison_exp
  $pool_voter: Int_comparison_exp
) {
  voteProcedure(where: {
    voter_role: { _eq: "SPO" }
    gov_action_proposal_id: $gov_action_proposal_id
    pool_voter: $pool_voter
  }) {
    vote
    pool_voter
    voting_anchor_id
    transaction {
      hash
    }
  }
}
